# Example NGINX Configuration for LumaFlow (Frontend SPA + Backend API)
#
# This file contains configuration blocks for:
# 1. Serving the static React SPA frontend files (Vite build output in /var/www/lumaflow/dist)
# 2. Reverse proxying the Express API backend to the locally running PM2 server (Port 3001)
#
# Usage:
# 1. Edit the domain names and paths to match your production setup.
# 2. Copy this file to `/etc/nginx/sites-available/thelumaflow.com`
# 3. Create a symlink to enable it: `sudo ln -s /etc/nginx/sites-available/thelumaflow.com /etc/nginx/sites-enabled/`
# 4. Test the config: `sudo nginx -t`
# 5. Reload NGINX: `sudo systemctl reload nginx`
# 6. Run Certbot to automatically provision SSL:
#    `sudo certbot --nginx -d thelumaflow.com -d www.thelumaflow.com -d api.thelumaflow.com`

# ──────────────────────────────────────────────────────────────────────────────
# FRONTEND SPA CONFIGURATION (thelumaflow.com & www.thelumaflow.com)
# ──────────────────────────────────────────────────────────────────────────────
server {
    server_name thelumaflow.com www.thelumaflow.com;

    # Point this to the build output directory on your VPS
    root /var/www/lumaflow/dist;
    index index.html;

    # Enable gzip compression for faster page load times
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Single Page Application routing (Vite Router fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static Assets caching (1 year cache for hashed Vite assets)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "upgrade-insecure-requests; default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval' wss:;" always;

    listen 80;
}

# ──────────────────────────────────────────────────────────────────────────────
# BACKEND API PROXY CONFIGURATION (api.thelumaflow.com)
# ──────────────────────────────────────────────────────────────────────────────
server {
    server_name api.thelumaflow.com;

    location / {
        # Proxy requests to PM2 Node process running locally on port 3001
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Express CORS handles origin limits, but standard proxy configuration is set here
        proxy_read_timeout 90;
    }

    # Certbot will automatically append SSL details below this line upon successful run
    listen 80;
}
