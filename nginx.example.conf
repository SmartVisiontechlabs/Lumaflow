# Example NGINX Configuration for LumaFlow Backend (VPS)
# This routes your custom domain to the locally running PM2 Node.js server.
#
# Usage: 
# 1. Copy this to /etc/nginx/sites-available/thelumaflow.com
# 2. Symlink to /etc/nginx/sites-enabled/
# 3. Use certbot to automatically provision SSL: sudo certbot --nginx -d api.thelumaflow.com

server {
    server_name api.thelumaflow.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # CORS headers (Handled by Express, but can be forced here if needed)
        # add_header 'Access-Control-Allow-Origin' 'https://thelumaflow.com' always;
    }

    # Certbot will automatically append the SSL configuration here after you run it.
    
    listen 80;
}
